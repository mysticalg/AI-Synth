name: Build VST3

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        # Build on all desktop targets we support so release artifacts stay in sync.
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update

          # JUCE needs X11/GTK development headers to build juceaide on Linux.
          # Keep this lean and stable: webkit is not required because JUCE_WEB_BROWSER=0.
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libfreetype6-dev \
            libglu1-mesa-dev \
            libgtk-3-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxdamage-dev \
            libxext-dev \
            libxfixes-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            pkg-config

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --target AISynth_VST3

      - name: Collect plugin artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact | Out-Null

          # VST3 artifacts are bundle directories on Windows; copy only directories
          # to avoid colliding with similarly named files inside the bundle.
          $vst3Dirs = Get-ChildItem -Path build -Recurse -Directory -Filter *.vst3
          if (-not $vst3Dirs) {
            throw "No .vst3 bundle directories were found under build/."
          }

          foreach ($dir in $vst3Dirs) {
            Copy-Item -Path $dir.FullName -Destination artifact -Recurse -Force
          }

      - name: Collect plugin artifact (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifact

          # Copy VST3 bundle directories only; they are package folders on Unix hosts.
          mapfile -t vst3_dirs < <(find build -type d -name "*.vst3")
          if [[ ${#vst3_dirs[@]} -eq 0 ]]; then
            echo "No .vst3 bundle directories were found under build/." >&2
            exit 1
          fi

          for dir in "${vst3_dirs[@]}"; do
            cp -R "$dir" artifact/
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AISynth-${{ matrix.os }}-VST3
          path: artifact
