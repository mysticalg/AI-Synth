name: Build VST3

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        # Build on all desktop targets we support so release artifacts stay in sync.
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update

          # JUCE needs X11/GTK development headers to build juceaide on Linux.
          # Keep this lean and stable: webkit is not required because JUCE_WEB_BROWSER=0.
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libfreetype6-dev \
            libglu1-mesa-dev \
            libgtk-3-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxdamage-dev \
            libxext-dev \
            libxfixes-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            pkg-config

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --target AISynth_VST3

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AISynth-${{ matrix.os }}-VST3
          # Upload VST3 bundle directories directly from the build tree.
          # This avoids OS-specific copy scripts (bash/pwsh differences) that can fail CI.
          path: |
            build/**/*.vst3
          if-no-files-found: error
