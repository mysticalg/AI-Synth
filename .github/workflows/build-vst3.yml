name: Build VST3

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        # Build on all desktop targets we support so release artifacts stay in sync.
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update

          # JUCE probes GTK/WebKit/X11 while generating helper tools (juceaide).
          # Keep this list explicit so CI remains reproducible across runner image updates.
          packages=(
            libasound2-dev
            libfreetype6-dev
            libglu1-mesa-dev
            libx11-dev
            libxcomposite-dev
            libxcursor-dev
            libxdamage-dev
            libxext-dev
            libxfixes-dev
            libxinerama-dev
            libxrandr-dev
            libxrender-dev
            pkg-config
          )

          # Select the first package candidate available on the runner image.
          choose_package() {
            local pkg
            for pkg in "$@"; do
              if apt-cache show "$pkg" >/dev/null 2>&1; then
                echo "$pkg"
                return 0
              fi
            done
            return 1
          }

          webkit_pkg="$(choose_package libwebkit2gtk-4.1-dev libwebkit2gtk-4.0-dev || true)"
          if [[ -z "$webkit_pkg" ]]; then
            echo "No supported libwebkit2gtk development package found on this runner" >&2
            exit 1
          fi
          packages+=("$webkit_pkg")

          gtk_pkg="$(choose_package libgtk-3-dev libgtk2.0-dev || true)"
          if [[ -z "$gtk_pkg" ]]; then
            echo "No supported GTK development package found on this runner" >&2
            exit 1
          fi
          packages+=("$gtk_pkg")

          echo "Installing Linux packages: ${packages[*]}"
          sudo apt-get install -y --no-install-recommends "${packages[@]}"

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --target AISynth_VST3

      - name: Collect plugin artifact
        shell: bash
        run: |
          mkdir -p artifact
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            powershell -Command "Get-ChildItem -Recurse build -Filter *.vst3 | Copy-Item -Destination artifact -Recurse"
          else
            find build -name "*.vst3" -exec cp -R {} artifact/ \;
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AISynth-${{ matrix.os }}-VST3
          path: artifact
