name: Build Plugins

on:
  workflow_dispatch: {}
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build-vst3:
    strategy:
      matrix:
        # Build on all desktop targets we support so release artifacts stay in sync.
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update

          # JUCE needs X11/GTK development headers to build juceaide on Linux.
          # Keep this lean and stable: webkit is not required because JUCE_WEB_BROWSER=0.
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libfreetype6-dev \
            libglu1-mesa-dev \
            libgtk-3-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxdamage-dev \
            libxext-dev \
            libxfixes-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            pkg-config

      - name: Configure (VST3 + Standalone)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build VST3
        run: cmake --build build --config Release --target AISynth_VST3

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: AISynth-${{ matrix.os }}-VST3
          # Upload VST3 bundle directories directly from the build tree.
          # This avoids OS-specific copy scripts (bash/pwsh differences) that can fail CI.
          path: |
            build/**/*.vst3
          if-no-files-found: error

  build-vst2-windows:
    # Keep VST2 aligned with VST3/standalone CI by running on every workflow trigger.
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Restore VST2 SDK from GitHub Secret
        shell: pwsh
        env:
          VST2_SDK_ZIP_BASE64: ${{ secrets.VST2_SDK_ZIP_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:VST2_SDK_ZIP_BASE64)) {
            throw "Missing VST2_SDK_ZIP_BASE64 secret. Add a base64-encoded VST2 SDK zip in repo secrets."
          }

          $zipPath = Join-Path $env:RUNNER_TEMP "vst2_sdk.zip"
          $sdkPath = Join-Path $env:RUNNER_TEMP "vst2_sdk"

          [IO.File]::WriteAllBytes($zipPath, [Convert]::FromBase64String($env:VST2_SDK_ZIP_BASE64))
          Expand-Archive -Path $zipPath -DestinationPath $sdkPath -Force

          # Persist for subsequent steps.
          "VST2_SDK_DIR=$sdkPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure (VST2 enabled)
        shell: pwsh
        run: cmake -S . -B build-vst2 -DCMAKE_BUILD_TYPE=Release -DAISYNTH_ENABLE_VST2=ON

      - name: Build VST2
        shell: pwsh
        run: cmake --build build-vst2 --config Release --target AISynth_VST

      - name: Upload VST2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: AISynth-windows-VST2
          path: |
            build-vst2/**/*AISynth*.dll
          if-no-files-found: error
