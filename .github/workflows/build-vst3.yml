name: Build VST3

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        # Build on all desktop targets we support so release artifacts stay in sync.
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update

          # JUCE probes GTK/WebKit/X11 while generating helper tools (juceaide).
          # Keep this list explicit so CI remains reproducible across runner image updates.
          packages=(
            libasound2-dev
            libfreetype6-dev
            libx11-dev
            libxcomposite-dev
            libxcursor-dev
            libxdamage-dev
            libxext-dev
            libxfixes-dev
            libxinerama-dev
            libxrandr-dev
            libxrender-dev
            libglu1-mesa-dev
          )

          # ubuntu-latest can move between releases where only one WebKit package exists.
          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            packages+=(libwebkit2gtk-4.1-dev)
          else
            packages+=(libwebkit2gtk-4.0-dev)
          fi

          # Prefer GTK3, but gracefully accept GTK2 on older/mirrored images.
          if apt-cache show libgtk-3-dev >/dev/null 2>&1; then
            packages+=(libgtk-3-dev)
          else
            packages+=(libgtk2.0-dev)
          fi

          sudo apt-get install -y "${packages[@]}"

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --target AISynth_VST3

      - name: Collect plugin artifact
        shell: bash
        run: |
          mkdir -p artifact
          find build -type f \( -name "*.vst3" -o -name "*.vst3/*" \) 2>/dev/null || true
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            powershell -Command "Get-ChildItem -Recurse build -Filter *.vst3 | Copy-Item -Destination artifact -Recurse"
          else
            find build -name "*.vst3" -exec cp -R {} artifact/ \;
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AISynth-${{ matrix.os }}-VST3
          path: artifact
